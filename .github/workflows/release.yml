name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  sync-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute tarball sha256
        id: sha
        run: |
          url="https://github.com/sigil-tech/sigil-ml/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          sha=$(curl -sL "$url" | shasum -a 256 | cut -d' ' -f1)
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Patch formula with release URL and sha256
        run: |
          sed -i \
            -e 's|url ".*archive/refs/tags/.*"|url "${{ steps.sha.outputs.url }}"|' \
            -e 's|sha256 "PLACEHOLDER"|sha256 "${{ steps.sha.outputs.sha256 }}"|' \
            Formula/sigil-ml.rb

      - name: Sync formula to Homebrew tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: Formula/sigil-ml.rb
          destination_repo: sigil-tech/homebrew-sigil
          destination_folder: Formula
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "sigil-ml ${{ github.ref_name }}"
